<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url("https://media.licdn.com/dms/image/v2/D4D22AQGaJqAVmYyR5A/feedshare-shrink_2048_1536/feedshare-shrink_2048_1536/0/1732278042278?e=2147483647&v=beta&t=EYffWSPaQzM7q6dFdW5jx0gLl4zGrQBwXsnXjBo2Z7Q");
            background-size: cover ;
            background-repeat: no-repeat;
            margin-top: 100px;
            margin-left: 100px;
            margin-right: 100px;
        }

    </style>

</head>
<body>

    <div class="container-fluid" style="background-color: #DFBCC1; opacity: 80%; text-align: center; height: auto; border-radius: 15px;">

        <h1 style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; color: #465F88 ">Electricity Consumption Classifier</h1>
        <!--comment-->

    </div>

    <div class="container-fluid" style="background-color: #DFBCC1; opacity: 80%; text-align: center; height: auto; border-radius: 15px; margin-top: 20px; height: 100px ;">

       <div class="row">

            <div class="col-3">
                <br>
                    <img src="https://img.freepik.com/free-vector/electric-flash-thunderbolt-light-bulb-symbol-design_1017-60403.jpg?semt=ais_rp_progressive&w=740&q=80" alt="lightbulb" style="width: 50px; height: 50px; border-radius: 5px;">
            </div>


            <div class="col-6">
             <br>
                <input type="text" id="Amount" class="form-control" placeholder="Type here..."  style="align-items: center;"></iput>
            </div>

            <div class="col-3">
             <br>
                <button class="btn btn-info" style="background-color: #A187A5; color: white; align-items: center;" onclick="checkAmount()">Consumption Classify!</button>
            </div>
        </div>

    </div>

    <script>
        function checkAmount(){
            var amount = document.getElementById("Amount").value;
            
            if(isNaN(amount) || amount < 0) {
                alert("Please input a valid number")
            }

            else if((amount >= 0) && (amount <=100)){
                alert("Lifeline Consumer: Discounted Electricity Rate ")
            }

            else if((amount >= 101) && (amount <=200)){
                alert("Low Consumption: Normal Residential Rate")
            }

            else if((amount >= 201) && (amount <=300)){
                alert("Average Consumption: Typical Electricity Usage")
            }

            else if((amount >= 301) && (amount <=500)){
                alert("High Consumption: Higher Electricity Usage")
            }

            else{
                alert("You're a very heavy electricity consumer.")
            }
        }
    </script>
    
</body>
</html>
